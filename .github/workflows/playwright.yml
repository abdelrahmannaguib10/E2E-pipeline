name: Playwright API E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  # Allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Override API base URL (optional)'
        required: false
        default: ''
  # Nightly run at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    name: Run API E2E Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: true
          API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.API_BASE_URL || 'https://doctrine-amiable-movie.ngrok-free.dev' }}
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (JUnit + traces)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Publish test summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/junit.xml ]; then
            echo "JUnit report generated. Download the 'playwright-report' artifact to view full results." >> $GITHUB_STEP_SUMMARY
          fi
